appId: com.opentwo.app
productName: OpenTwo
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{postcss.config.js,tailwind.config.js}'
win:
  executableName: OpenTwo
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: OpenTwo needs camera access for webcam overlay
    - NSMicrophoneUsageDescription: OpenTwo needs microphone access for audio recording
    - NSScreenCaptureDescription: OpenTwo needs screen capture access for recording
  notarize: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
linux:
  target:
    - target: AppImage
      arch:
        - x64
  maintainer: workaferaw
  category: Utility
